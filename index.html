<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7f6f1" />
  <title>Newsletter Insight Digest</title>
  <style>
    :root {
      --bg: #f7f6f1;
      --ink: #171918;
      --muted: #5f6864;
      --line: #dedbd2;
      --panel: #fffef9;
      --green: #0a6f56;
      --blue: #2857b7;
      --gold: #d89b21;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; }
    .shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 42px;
    }
    .top {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    .kicker {
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 11ch;
      font-size: clamp(2.2rem, 8vw, 5.2rem);
      line-height: 0.95;
    }
    .lede {
      max-width: 66ch;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.5;
    }
    .signal {
      display: grid;
      gap: 12px;
      margin: 22px 0;
      padding: clamp(18px, 4vw, 30px);
      border: 1px solid #cfd7d2;
      border-radius: 10px;
      background: #10201d;
      color: #f7fffb;
    }
    .signal h2 {
      margin: 0;
      max-width: 16ch;
      font-size: clamp(1.9rem, 5vw, 3.8rem);
      line-height: 1;
    }
    .signal p { max-width: 74ch; color: #dbe8e4; }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      color: #bdd3cc;
      font-size: 0.76rem;
      font-weight: 850;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.8fr);
      gap: 18px;
      align-items: start;
    }
    .section {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }
    .card-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .card {
      display: grid;
      gap: 8px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .card h3 {
      margin: 0;
      font-size: clamp(1.08rem, 2vw, 1.32rem);
      line-height: 1.15;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
    .meta {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      text-transform: uppercase;
    }
    .why {
      padding-left: 10px;
      border-left: 3px solid var(--gold);
      color: #313834;
      font-size: 0.96rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .links a {
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--blue);
      font-size: 0.82rem;
      font-weight: 800;
      text-decoration: none;
    }
    .rail {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 12px;
    }
    .rail-card {
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef3f1;
    }
    .rail-card h2 { margin: 0 0 10px; font-size: 1.1rem; }
    .rail-card ul { margin: 0; padding-left: 18px; }
    .rail-card li { margin: 0 0 8px; line-height: 1.4; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .rail { position: static; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <div class="kicker">Cloidberg public demo</div>
      <h1>Newsletter Insight Digest</h1>
      <p class="lede">A sanitized public snapshot of the local newsletter digest UI: signals, content angles, and follow-up ideas without inbox metadata.</p>
    </section>
    <div id="app">Loading digest...</div>
  </main>
  <script>
    const app = document.querySelector('#app');
    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));
    const compact = (value, max = 180) => {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      return text.length <= max ? text : `${text.slice(0, max - 1).trim()}...`;
    };
    const links = sourceLinks => {
      const safe = Array.isArray(sourceLinks) ? sourceLinks : [];
      if (!safe.length) return '';
      return `<div class="links">${safe.slice(0, 3).map(link =>
        `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label || 'Source')}</a>`
      ).join('')}</div>`;
    };
    const storyCard = story => `
      <li class="card">
        <div class="meta">${escapeHtml(story.category || 'News')}${story.source_names?.length ? ` · ${escapeHtml(story.source_names.join(' + '))}` : ''}</div>
        <h3>${escapeHtml(story.title)}</h3>
        <p>${escapeHtml(compact(story.summary))}</p>
        ${story.why_it_matters ? `<p class="why"><strong>Why it matters:</strong> ${escapeHtml(compact(story.why_it_matters, 155))}</p>` : ''}
        ${links(story.source_links)}
      </li>
    `;
    const simpleCard = (item, label) => `
      <li class="card">
        <div class="meta">${label}</div>
        <h3>${escapeHtml(item.title || item.name)}</h3>
        <p>${escapeHtml(compact(item.summary || item.angle || item.workflow_angle || item.evidence, 175))}</p>
        ${item.workflow_angle ? `<p class="why">${escapeHtml(compact(item.workflow_angle, 140))}</p>` : ''}
        ${links(item.source_links)}
      </li>
    `;
    const render = digest => {
      const stories = digest.top_stories || [];
      const signal = stories[0] || {};
      app.innerHTML = `
        <section class="signal">
          <div class="tag-row">
            <span class="tag">Today's Signal</span>
            <span class="tag">${escapeHtml(signal.category || digest.window?.label || 'Latest')}</span>
          </div>
          <h2>${escapeHtml(signal.title || 'No digest yet')}</h2>
          <p>${escapeHtml(compact(signal.summary || 'Write the latest public export to publish the digest.', 260))}</p>
          ${signal.why_it_matters ? `<p class="why"><strong>Why it matters:</strong> ${escapeHtml(compact(signal.why_it_matters, 210))}</p>` : ''}
          ${links(signal.source_links)}
        </section>
        <div class="grid">
          <div>
            <section class="section">
              <h2>News</h2>
              <ol class="card-list">${stories.map(storyCard).join('')}</ol>
            </section>
            <section class="section">
              <h2>Agent Signals</h2>
              <ul class="card-list">${(digest.agent_signals || []).map(item => simpleCard(item, 'Signal')).join('')}</ul>
            </section>
            <section class="section">
              <h2>Content Ideas</h2>
              <ul class="card-list">${(digest.content_ideas || []).map(item => simpleCard(item, 'Draft angle')).join('')}</ul>
            </section>
          </div>
          <aside class="rail">
            <section class="rail-card">
              <h2>Tools / Launches</h2>
              <ul>${(digest.tools_and_launches || []).slice(0, 4).map(item => `<li><strong>${escapeHtml(item.name)}:</strong> ${escapeHtml(compact(item.summary, 95))}</li>`).join('') || '<li>No tools in this export.</li>'}</ul>
            </section>
            <section class="rail-card">
              <h2>Watchlist</h2>
              <ul>${(digest.watchlist || []).map(item => `<li>${escapeHtml(item)}</li>`).join('') || '<li>No public watch items.</li>'}</ul>
            </section>
          </aside>
        </div>
      `;
    };
    fetch('./data/latest.json', { cache: 'no-store' })
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(render)
      .catch(error => {
        app.textContent = `Could not load public digest: ${error.message}`;
      });
  </script>
</body>
</html>
